name: Release

# Manual only — no auto-publish on merge to main.
# Trigger from the Actions tab ("Run workflow") when you want to cut a release.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs Node and pnpm at the exact versions pinned in mise.toml.
      - name: Setup toolchain (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      # Configure npm auth for changesets publish.
      - name: Configure npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # When changesets exist, this opens or updates a "Version Packages" PR.
      # When none remain (after that PR merges), it publishes to npm.
      - uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
